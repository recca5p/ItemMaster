name: CI/CD Lambda (.NET 8)

on:
  workflow_dispatch:
    inputs:
      migration_name:
        description: 'Optional EF migration name to generate (artifact only)'
        required: false
        default: ''

env:
  AWS_REGION: ap-southeast-1
  LAMBDA_FUNCTION_NAME: im-dev-lambda-item-master
  PROJECT_PATH: ItemMaster.Lambda
  OUTPUT_DIR: out
  MYSQL_SECRET_ID: ${{ secrets.RDS_SECRET_ID }}

permissions:
  id-token: write
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.x' }
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"
      - name: Publish (linux-arm64)
        run: |
          dotnet publish -c Release -r linux-arm64 --self-contained false -o $OUTPUT_DIR ./ItemMaster.Lambda/src/ItemMaster.Lambda
          cd $OUTPUT_DIR && zip -r ../function.zip . && cd -
      - uses: actions/upload-artifact@v4
        with: { name: lambda-package, path: function.zip }

  generate-migration:
    if: ${{ github.event.inputs.migration_name != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.x' }
      - name: Install EF Tools
        run: |
          dotnet tool install --global dotnet-ef
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
      - name: Generate migration
        run: |
          dotnet ef migrations add "${{ github.event.inputs.migration_name }}" \
            --project ItemMaster.Lambda/src/ItemMaster.Infrastructure \
            --startup-project ItemMaster.Lambda/src/ItemMaster.Lambda \
            --context ItemMaster.Infrastructure.Ef.ItemMasterDbContext \
            --output-dir Ef/Migrations
      - uses: actions/upload-artifact@v4
        with:
          name: ef-migration-${{ github.event.inputs.migration_name }}
          path: |
            ItemMaster.Lambda/src/ItemMaster.Infrastructure/Ef/Migrations/**

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with: { name: lambda-package, path: . }

      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --zip-file fileb://function.zip \
            --publish
          aws lambda wait function-updated --function-name "$LAMBDA_FUNCTION_NAME"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Enable APPLY_MIGRATIONS
        run: |
          aws lambda get-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --query 'Environment.Variables' --output json > /tmp/env.json
          jq -c '. + {"APPLY_MIGRATIONS":"true"}' /tmp/env.json | jq -c '{Variables: .}' > /tmp/env-on.json
          aws lambda update-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --environment file:///tmp/env-on.json
          aws lambda wait function-updated --function-name "$LAMBDA_FUNCTION_NAME"
      
      - name: Invoke Lambda to run migrations
        run: |
          echo '{}' > /tmp/payload.json
          aws lambda invoke \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --payload fileb:///tmp/payload.json \
            --cli-binary-format raw-in-base64-out \
            /tmp/out.json >/dev/null || true
          aws logs tail "/aws/lambda/${LAMBDA_FUNCTION_NAME}" --since 10m --format short || true
          cat /tmp/out.json || true
      
      - name: Disable APPLY_MIGRATIONS
        run: |
          aws lambda get-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --query 'Environment.Variables' --output json > /tmp/env.json
          jq -c 'del(.APPLY_MIGRATIONS)' /tmp/env.json | jq -c '{Variables: .}' > /tmp/env-off.json
          aws lambda update-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --environment file:///tmp/env-off.json
          aws lambda wait function-updated --function-name "$LAMBDA_FUNCTION_NAME"


